<html> 
  <head>
    <title> realidade aumentada  usandoodelo 3D de A-frame e o marcador hiro </title>
    <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <!-- we import arjs version without NFT but with marker + location based support -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin 0px; overFlow: hidden">
    <a-scene vr-mode-ui="enabled:false" embedded arjs="debugUIEnabled: false">
      <a-marker present="hiro">
        <a-box positions="0 0.5 0" material="color: pink>"</a-box>
      </a-marker>
    </a-scene>
    
  
    
  </body>

</html>
